<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swaraj Nexus v7.0</title>
    <style>
        :root { --neon-blue: #00f3ff; --neon-green: #39ff14; --dark-bg: #050505; --glass: rgba(255, 255, 255, 0.1); }
        body { background: var(--dark-bg); color: white; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        /* Sci-Fi Background Animation */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #111 10%, transparent 10%); background-size: 20px 20px; opacity: 0.1; z-index: -1; }

        .screen { width: 100%; min-height: 100vh; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; animation: fadeIn 0.5s ease; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .glass-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); }
        
        h1, h2 { text-shadow: 0 0 10px var(--neon-blue); color: var(--neon-blue); text-transform: uppercase; }
        
        .nexus-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .nexus-node { background: rgba(0, 243, 255, 0.05); border: 1px solid var(--neon-blue); padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nexus-node:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }

        button { background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: var(--neon-green); color: black; box-shadow: 0 0 15px var(--neon-green); }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--neon-blue); z-index: 100; }
        
        /* Live Feed */
        .live-cam { width: 100%; height: 150px; background: #000; border: 1px solid red; border-radius: 10px; position: relative; overflow: hidden; }
        .scan-line { width: 100%; height: 2px; background: rgba(255,0,0,0.5); position: absolute; animation: scan 2s infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        /* Chatbot */
        #ai-bot { position: fixed; bottom: 80px; right: 20px; width: 50px; height: 50px; background: var(--neon-blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; box-shadow: 0 0 15px var(--neon-blue); }
    </style>
</head>
<body>

    <!-- ১. নেক্সাস এন্ট্রি (Unified Entry) -->
    <div id="nexus-screen" class="screen active">
        <div style="text-align:center; margin-top:40px;">
            <div style="font-size: 60px; filter: drop-shadow(0 0 10px var(--neon-blue));">💠</div>
            <h1>SWARAJ NEXUS</h1>
            <p id="offline-status" style="color:var(--neon-green);">[ SYSTEM ONLINE ]</p>
        </div>
        
        <div class="nexus-grid">
            <div class="nexus-node" onclick="enterPortal('SW')">COMMANDER</div>
            <div class="nexus-node" onclick="enterPortal('MA')">MOTHER</div>
            <div class="nexus-node" onclick="enterPortal('TR')">TEACHER</div>
            <div class="nexus-node" onclick="enterPortal('US')">MARKET</div>
        </div>
        
        <div class="glass-card" style="margin-top:30px;">
            <input type="text" id="access-id" placeholder="ENTER ACCESS KEY">
            <button onclick="validateAccess()">INITIATE AUTHENTICATION</button>
        </div>
    </div>

    <!-- ২. মা পোর্টাল (MA) -->
    <div id="mother-dash" class="screen">
        <h2>MATERNAL OVERWATCH</h2>
        <div class="live-cam"><div class="scan-line"></div><p style="text-align:center; margin-top:60px; color:red;">FEED: GARDEN-1</p></div>
        <div class="nexus-grid">
            <button onclick="alert('Requesting Video Call to Outlet...')">📞 CALL OUTLET</button>
            <button onclick="alert('Tiffin Time Request Sent')">🕒 TIFFIN CONNECT</button>
        </div>
        <div class="glass-card" style="margin-top:20px;">
            <p>NUTRITION: OPTIMAL</p>
            <button onclick="switchTab('market')">🛒 GO TO MARKET</button>
        </div>
    </div>

    <!-- ৩. স্বরাজ মার্কেটপ্লেস (Market) -->
    <div id="market-screen" class="screen">
        <h2>SWARAJ MARKET</h2>
        <div class="glass-card">
            <p>BALANCE: ৳ <span id="bal">450</span></p>
        </div>
        <div class="nexus-grid">
            <div class="nexus-node" onclick="buy('Food')">🍞 FOOD</div>
            <div class="nexus-node" onclick="buy('Cloth')">👕 CLOTH</div>
            <div class="nexus-node" onclick="buy('Health')">🏥 HEALTH</div>
            <div class="nexus-node" onclick="buy('Edu')">📚 EDU</div>
        </div>
        <button onclick="switchTab('back')" style="margin-top:20px;">BACK TO DASHBOARD</button>
    </div>

    <!-- ৪. কমান্ডারের ড্যাশবোর্ড (Master) -->
    <div id="master-dash" class="screen">
        <h2>SUPREME COMMAND</h2>
        <div class="glass-card">
            <p>TOTAL PULSE: <span style="color:var(--neon-green);">890,450,000</span></p>
            <p>ACTIVE AGENTS: 200</p>
            <p>TERRITORY CONTROL: 20%</p>
        </div>
        <button onclick="alert('Opening Global Map...')">🌐 GLOBAL MAP</button>
        <button onclick="logout()">TERMINATE SESSION</button>
    </div>

    <!-- ৫. এআই চ্যাটবট -->
    <div id="ai-bot" onclick="alert('Swaraj AI: How can I assist your purchase today?')">🤖</div>

    <!-- নেভিগেশন বার -->
    <div class="nav-bar" id="nav" style="display:none;">
        <button onclick="switchTab('nexus')">NEXUS</button>
        <button onclick="switchTab('market')">MARKET</button>
        <button onclick="logout()">EXIT</button>
    </div>

    <script>
        let currentRole = "";

        function validateAccess() {
            const id = document.getElementById('access-id').value.trim().toUpperCase();
            if(id === 'SW-MASTER-999') {
                showScreen('master-dash');
                document.getElementById('nav').style.display = 'flex';
            } else if(id.startsWith('MA')) {
                currentRole = "MA";
                showScreen('mother-dash');
                document.getElementById('nav').style.display = 'flex';
            } else if(id.startsWith('US')) {
                showScreen('market-screen');
                document.getElementById('nav').style.display = 'flex';
            } else {
                alert("ACCESS DENIED: INVALID KEY");
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function switchTab(target) {
            if(target === 'market') showScreen('market-screen');
            else if(target === 'nexus') showScreen('nexus-screen');
            else if(target === 'back') {
                if(currentRole === "MA") showScreen('mother-dash');
                else showScreen('nexus-screen');
            }
        }

        function buy(item) {
            alert(item + " Order Initiated. AI processing...");
        }

        function logout() { location.reload(); }

        // অফলাইন সিমুলেশন
        window.addEventListener('offline', () => {
            document.getElementById('offline-status').innerText = "[ OFFLINE MODE: SMS SYNC ACTIVE ]";
            document.getElementById('offline-status').style.color = "orange";
        });
    </script>
</body>
</html>
